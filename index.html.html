<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Media Solutions — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Barlow', sans-serif;
  background: #080A0E;
  color: #EEF2F7;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
}
.bg-glow {
  position: fixed; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,210,255,0.05) 0%, transparent 70%);
  pointer-events: none; top: -100px; right: -100px;
}
.logo-wrap { text-align: center; margin-bottom: 48px; }
.logo-mark {
  width: 56px; height: 56px; border-radius: 12px;
  background: #00D2FF; display: inline-flex;
  align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 1.1rem; color: #080A0E;
  margin-bottom: 14px;
  box-shadow: 0 0 30px rgba(0,210,255,0.3);
}
.logo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.6rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
}
.logo-sub { font-size: 0.82rem; color: #5A6478; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 700px; width: 100%; }

.portal-card {
  background: #131720;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; padding: 36px 28px;
  text-align: center; text-decoration: none; color: inherit;
  transition: all 0.25s;
  display: block;
}
.portal-card:hover {
  border-color: rgba(0,210,255,0.35);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 24px rgba(0,210,255,0.08);
}
.card-icon { font-size: 2.8rem; margin-bottom: 16px; }
.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #00D2FF; margin-bottom: 8px;
}
.card-desc { font-size: 0.83rem; color: #5A6478; line-height: 1.5; margin-bottom: 20px; }
.card-btn {
  display: inline-block;
  padding: 9px 22px;
  background: #00D2FF; color: #080A0E;
  border-radius: 7px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
}
.portal-card.client .card-btn { background: #1B3A5C; color: white; }
.portal-card.client:hover .card-btn { background: #2A5580; }

.footer { margin-top: 40px; font-size: 0.75rem; color: #3A3F4A; text-align: center; }

@media (max-width: 500px) {
  .cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="logo-wrap">
  <div class="logo-mark">TMS</div>
  <div class="logo-name">Triangle Media Solutions</div>
  <div class="logo-sub">LED Wall Rental Portal</div>
</div>

<div class="cards">
  <a class="portal-card" href="admin.html">
    <div class="card-icon">⚙️</div>
    <div class="card-title">Admin Portal</div>
    <div class="card-desc">Manage rentals, LED wall inventory, billing, and church accounts.</div>
    <span class="card-btn">Enter Admin →</span>
  </a>
  <a class="portal-card client" href="index.html">
    <div class="card-icon">⛪</div>
    <div class="card-title">Church Portal</div>
    <div class="card-desc">View your LED wall, make payments, and access your documents.</div>
    <span class="card-btn">Enter Portal →</span>
  </a>
</div>

<div class="footer">© 2025 Triangle Media Solutions · All rights reserved</div>
</body>
</html>
